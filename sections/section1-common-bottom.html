<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>배민 먹을복 페스타</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Apple SD Gothic Neo',sans-serif;background:#f5f5f5;color:#1a1a1a}
.frame{max-width:375px;margin:0 auto;background:#fff;min-height:100vh;position:relative}
.hdr{padding:12px 16px;display:flex;align-items:center;border-bottom:1px solid #eee;position:sticky;top:0;background:#fff;z-index:20}
.hdr .back{font-size:20px;margin-right:12px;text-decoration:none;color:#1a1a1a}
.hdr h1{font-size:17px;font-weight:700}
/* 주차탭 */
.wk-tabs{display:flex;border-bottom:2px solid #eee;position:sticky;top:45px;background:#fff;z-index:15}
.wk-tab{flex:1;text-align:center;padding:14px 0 10px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px}
.wk-tab .t1{font-size:14px;font-weight:700;color:#aaa}.wk-tab .t2{font-size:11px;color:#bbb;margin-top:2px}
.wk-tab.on .t1,.wk-tab.on .t2{color:#2AC1BC}.wk-tab.on{border-bottom-color:#2AC1BC}
.wp{display:none}.wp.on{display:block}
/* KV */
.kv{width:100%;height:100px;background:#7DD8D4 url('') center/cover no-repeat;display:flex;align-items:flex-end;justify-content:center;color:#fff;font-size:14px;position:relative;overflow:hidden}
.kv img{width:100%;height:100%;object-fit:cover}
/* CTA */
.cta-area{padding:24px 16px;text-align:center;display:none}
.cta-area p{font-size:15px;color:#555;margin-bottom:14px;line-height:1.5}
.cta-btn{width:100%;padding:16px;background:#2AC1BC;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;display:none}
.cta-btn:active{background:#1DA8A3}
.result{display:none}.result.show{display:block}
/* 미로그인 backfill */
.bf-login{margin:20px 16px;padding:24px 20px;background:linear-gradient(135deg,#FF6B00,#FF8A00);border-radius:16px;color:#fff;text-align:center}
.bf-login .bf-emoji{font-size:48px;margin-bottom:12px}
.bf-login .bf-title{font-size:20px;font-weight:800;margin-bottom:6px}
.bf-login .bf-desc{font-size:14px;opacity:.9;margin-bottom:16px;line-height:1.5}
.bf-login-btn{width:100%;padding:14px;background:#fff;color:#FF6B00;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer}
.bf-popular{margin:16px 16px;padding:16px;background:#F9FAFB;border-radius:14px}
.bf-popular .bp-title{font-size:15px;font-weight:700;margin-bottom:12px;color:#1a1a1a}
.bf-popular .bp-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f0f0f0}
.bf-popular .bp-item:last-child{border-bottom:none}
.bf-popular .bp-rank{font-size:14px;font-weight:800;color:#2AC1BC;width:24px}
.bf-popular .bp-name{flex:1;font-size:14px;font-weight:600}
.bf-popular .bp-count{font-size:12px;color:#888}
/* 결과카드 */
.rc{margin:20px 16px;padding:24px 20px;background:linear-gradient(135deg,#2AC1BC,#1DA8A3);border-radius:16px;color:#fff;position:relative}
.rc .share{position:absolute;top:16px;right:16px;width:32px;height:32px;background:rgba(255,255,255,.25);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer}
.rc .nick{font-size:14px;opacity:.9;margin-bottom:2px}.rc .ttl{font-size:22px;font-weight:800;margin-bottom:18px}
.bars{display:flex;flex-direction:column;gap:10px}
.br{display:flex;align-items:center;gap:10px}.br .lb{font-size:13px;width:56px;flex-shrink:0;opacity:.9}
.br .bg{flex:1;height:8px;background:rgba(255,255,255,.25);border-radius:4px;overflow:hidden}
.br .fl{height:100%;border-radius:4px;background:#fff;transition:width 1s}.br .pc{font-size:12px;width:36px;text-align:right;font-weight:700}
/* 한줄평 */
.rv{margin:0 16px 16px;padding:18px 20px;background:#F9FAFB;border-radius:14px}
.rv .rv-t{font-size:14px;font-weight:700;margin-bottom:10px;color:#2AC1BC}.rv p{font-size:13px;color:#555;line-height:1.6}
/* 맛탭 */
.tt{display:flex;gap:6px;padding:16px 16px 0;overflow-x:auto;-webkit-overflow-scrolling:touch}.tt::-webkit-scrollbar{display:none}
.ttb{padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;border:1.5px solid #eee;background:#fff;cursor:pointer;white-space:nowrap;color:#888}
.ttb.on{background:#2AC1BC;color:#fff;border-color:#2AC1BC}
.ttb.my{position:relative}.ttb.my::after{content:'MY';position:absolute;top:-6px;right:-4px;font-size:9px;background:#FF6B00;color:#fff;padding:1px 4px;border-radius:6px;font-weight:700}
.tp{display:none}.tp.on{display:block}
/* 가게 섹션 */
.st{padding:16px 16px 8px;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:space-between}
.st em{color:#2AC1BC;font-style:normal;margin-right:1px}
.st .loc{font-size:12px;color:#2AC1BC;background:#F0FAFA;padding:4px 10px;border-radius:12px;font-weight:600}
.refresh-row{display:flex;align-items:center;justify-content:space-between;padding:0 16px 10px}
.refresh-row .sub{font-size:12px;color:#aaa}
.refresh-btn{background:none;border:1px solid #ddd;border-radius:16px;padding:4px 12px;font-size:11px;color:#888;cursor:pointer;display:flex;align-items:center;gap:4px}
.refresh-btn:active{background:#f5f5f5}
/* 가게카드 */
.shop{margin:0 16px 12px;padding:14px;background:#fff;border:1px solid #f0f0f0;border-radius:14px;display:flex;gap:12px;align-items:center}
.shop:active{background:#fafafa}
.shop-img{width:56px;height:56px;border-radius:12px;background:#f5f5f5;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:24px}
.shop-bd{flex:1;min-width:0}
.shop-top{display:flex;align-items:center;gap:6px;margin-bottom:2px;flex-wrap:wrap}
.shop-nm{font-size:15px;font-weight:700}
.cpn{font-size:10px;background:#FFE8E8;color:#E53935;padding:2px 6px;border-radius:4px;font-weight:700;white-space:nowrap}
.shop-rt{font-size:12px;color:#888;margin-bottom:1px}.shop-dl{font-size:11px;color:#aaa}
.shop-btn{padding:8px 16px;background:#2AC1BC;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0}
/* 상시혜택 - 배짱할인 스타일 */
.promo{margin-top:24px;background:#F7F7F7;padding:24px 0}
.promo-t{font-size:18px;font-weight:800;padding:0 16px 4px}.promo-sub{font-size:13px;color:#888;padding:0 16px 16px}
.promo-list{padding:0 16px;display:flex;flex-direction:column;gap:12px}
.promo-item{background:#fff;border-radius:14px;padding:16px;display:flex;align-items:center;gap:14px;border:1px solid #f0f0f0}
.promo-ic{width:48px;height:48px;border-radius:12px;background:#F0FAFA;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.promo-bd{flex:1}.promo-nm{font-size:14px;font-weight:700;margin-bottom:2px}.promo-ds{font-size:12px;color:#888;line-height:1.4}
.promo-arr{color:#ccc;font-size:16px}
/* 배짱할인 세부 섹션 */
.promo-sec{padding:0 16px;margin-bottom:20px}
.promo-sec-t{font-size:15px;font-weight:700;margin-bottom:4px}.promo-sec-sub{font-size:12px;color:#888;margin-bottom:12px}
.promo-sec-sub b{color:#E53935}
.coupon-box{background:#fff;border-radius:14px;padding:20px;text-align:center;border:1px solid #f0f0f0;margin-bottom:12px}
.coupon-box .q-marks{font-size:36px;letter-spacing:12px;margin-bottom:10px}
.coupon-box .q-desc{font-size:13px;color:#888}
.brand-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;-webkit-overflow-scrolling:touch}.brand-row::-webkit-scrollbar{display:none}
.brand-chip{width:44px;height:44px;border-radius:50%;background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;border:1px solid #eee}
.deal-card{background:#fff;border-radius:14px;padding:14px;border:1px solid #f0f0f0;margin-bottom:10px;display:flex;gap:12px;align-items:center}
.deal-img{width:80px;height:60px;background:#f5f5f5;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}
.deal-bd{flex:1}.deal-nm{font-size:14px;font-weight:700;margin-bottom:2px}.deal-price{font-size:12px;color:#E53935;font-weight:700}.deal-orig{font-size:11px;color:#bbb;text-decoration:line-through;margin-left:4px}
.deal-btn{padding:6px 14px;background:#2AC1BC;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;flex-shrink:0}
.near-card{background:#fff;border-radius:14px;padding:14px;border:1px solid #f0f0f0;margin-bottom:10px;display:flex;gap:10px;align-items:center}
.near-img{width:48px;height:48px;border-radius:10px;background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.near-bd{flex:1}.near-nm{font-size:13px;font-weight:700;margin-bottom:1px}.near-ds{font-size:11px;color:#888}
.more-btn{display:block;width:100%;padding:12px;background:#fff;border:1px solid #ddd;border-radius:12px;text-align:center;font-size:13px;color:#555;font-weight:600;cursor:pointer;margin-top:8px}
.pickup-banner{background:#2AC1BC;border-radius:14px;padding:18px;text-align:center;color:#fff;margin:0 16px 20px}
.pickup-banner .pk-t{font-size:16px;font-weight:700;margin-bottom:4px}.pickup-banner .pk-s{font-size:12px;opacity:.85}
.share-sec{padding:20px 16px;text-align:center;background:#fff;border-radius:14px;margin:0 16px 20px;border:1px solid #f0f0f0}
.share-sec p{font-size:14px;font-weight:600;margin-bottom:12px}
.share-icons{display:flex;justify-content:center;gap:20px}
.share-icon{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:11px;color:#888;cursor:pointer}
.share-icon span{width:44px;height:44px;border-radius:50%;background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:20px}
/* 섹션2 꿀조합 */
.combo-hdr{padding:24px 16px 8px}.combo-hdr h2{font-size:22px;font-weight:800;margin-bottom:4px}.combo-hdr .sub{font-size:14px;color:#888}
.combo-tabs{display:flex;margin:16px 16px 0;background:#f0f0f0;border-radius:24px;padding:3px}
.combo-tab{flex:1;text-align:center;padding:10px 0;border-radius:22px;font-size:13px;font-weight:600;color:#888;cursor:pointer}
.combo-tab.on{background:#2AC1BC;color:#fff}
.combo-panel{display:none}.combo-panel.on{display:block}
.combo-card{margin:12px 16px;padding:16px;background:#fff;border:1px solid #f0f0f0;border-radius:14px;display:flex;align-items:center;gap:12px}
.combo-imgs{display:flex;gap:4px;flex-shrink:0}.combo-imgs span{font-size:28px}
.combo-bd{flex:1}.combo-cat{font-size:12px;color:#888;margin-bottom:2px}.combo-nm{font-size:15px;font-weight:700;margin-bottom:6px}
.combo-tags{display:flex;gap:6px}.combo-tag{font-size:11px;padding:4px 10px;border:1px solid #ddd;border-radius:14px;color:#555}
.combo-btn{padding:8px 16px;background:#2AC1BC;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;flex-shrink:0}
/* pair-deal 아코디언 */
.pair{margin:12px 16px;border:1px solid #f0f0f0;border-radius:14px;overflow:hidden;background:#fff}
.pair-hdr{display:flex;align-items:center;gap:10px;padding:14px;cursor:pointer;transition:background .2s}
.pair-hdr:active{background:#fafafa}
.pair-thumbs{display:flex;align-items:center;gap:0;flex-shrink:0}
.pair-th{width:48px;height:48px;border-radius:10px;background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:24px;border:2px solid #fff;position:relative}
.pair-th:nth-child(2){margin-left:-10px}
.pair-plus{font-size:14px;color:#ccc;margin:0 2px}
.pair-info{flex:1;min-width:0}
.pair-label{font-size:11px;color:#888;margin-bottom:1px}
.pair-nm{font-size:14px;font-weight:700}
.pair-price{display:flex;align-items:center;gap:4px;margin-top:2px;flex-wrap:wrap}
.pair-final{font-size:13px;font-weight:700;color:#E53935}
.pair-orig{font-size:11px;color:#bbb;text-decoration:line-through}
.pair-save{font-size:10px;color:#2AC1BC;font-weight:600}
.pair-chev{font-size:14px;color:#ccc;transition:transform .3s;flex-shrink:0}
.pair.open .pair-chev{transform:rotate(180deg)}
.pair-detail{max-height:0;overflow:hidden;transition:max-height .4s ease;background:#F9FAFB}
.pair.open .pair-detail{max-height:500px}
.pair-shop{display:flex;align-items:center;gap:10px;padding:12px 14px;border-top:1px solid #f0f0f0}
.pair-shop-img{width:44px;height:44px;border-radius:10px;background:#eee;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.pair-shop-bd{flex:1;min-width:0}
.pair-shop-nm{font-size:13px;font-weight:700;margin-bottom:1px}
.pair-shop-ds{font-size:11px;color:#888}
.pair-shop-btn{padding:6px 14px;background:#2AC1BC;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;flex-shrink:0}
/* pair 쿠폰 각각 지급 */
.pair-coupons{display:flex;gap:6px;padding:10px 14px;border-top:1px solid #f0f0f0;background:#FFF8F0}
.point-banner{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#F0EEFF;border-top:1px solid #e8e4ff}
.point-banner .pb-tag{font-size:10px;background:#fff;color:#6C5CE7;padding:2px 8px;border-radius:10px;font-weight:700;white-space:nowrap}
.point-banner .pb-text{flex:1;font-size:12px;font-weight:700;color:#1a1a1a;line-height:1.4}
.point-banner .pb-text b{color:#6C5CE7}
.point-banner .pb-badge{background:#6C5CE7;color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:10px;white-space:nowrap}
.pair-cpn{font-size:11px;background:#FFE8E8;color:#E53935;padding:4px 10px;border-radius:8px;font-weight:700;display:flex;align-items:center;gap:4px}
/* 가게 브랜드 아코디언 */
.brand-acc{margin:0 16px 10px;border:1px solid #f0f0f0;border-radius:14px;overflow:hidden;background:#fff}
.brand-hdr{display:flex;align-items:center;gap:10px;padding:14px;cursor:pointer}
.brand-hdr:active{background:#fafafa}
.brand-ic{width:44px;height:44px;border-radius:10px;background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.brand-bd{flex:1;min-width:0}
.brand-nm{font-size:14px;font-weight:700;margin-bottom:1px}
.brand-cpn{font-size:10px;background:#FFE8E8;color:#E53935;padding:2px 6px;border-radius:4px;font-weight:700;margin-left:6px}
.brand-sub{font-size:11px;color:#888}
.brand-chev{font-size:12px;color:#ccc;transition:transform .3s;flex-shrink:0}
.brand-acc.open .brand-chev{transform:rotate(180deg)}
.brand-detail{max-height:0;overflow:hidden;transition:max-height .4s ease;background:#F9FAFB}
.brand-acc.open .brand-detail{max-height:400px}
.branch{display:flex;align-items:center;gap:10px;padding:12px 14px;border-top:1px solid #f0f0f0}
.branch-nm{flex:1;font-size:13px;font-weight:600}
.branch-ds{font-size:11px;color:#888;margin-right:8px}
.branch-btn{padding:6px 14px;background:#2AC1BC;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer}
/* 리뷰 캐러셀 */
.rv-carousel{padding:16px 0;overflow:hidden}
.rv-track{display:flex;transition:transform .5s ease}
.rv-slide{flex-shrink:0;width:85%;margin-right:10px;border-radius:14px;overflow:hidden;position:relative;aspect-ratio:16/10;background:#f3f4f6}
.rv-slide img{width:100%;height:100%;object-fit:cover}
.rv-overlay{position:absolute;bottom:0;left:0;right:0;padding:14px 16px;background:linear-gradient(transparent,rgba(0,0,0,.5) 40%);display:flex;flex-direction:column;gap:4px}
.rv-stars{font-size:12px;color:#fbbf24;letter-spacing:1px}
.rv-text{font-size:13px;line-height:1.5;color:#fff;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.rv-shop-info{display:flex;align-items:center;gap:10px;padding:8px 16px}
.rv-shop-logo{width:32px;height:32px;border-radius:50%;background:#e5e7eb;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.rv-shop-text{flex:1;min-width:0}
.rv-shop-name{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rv-shop-menu{font-size:12px;color:#888;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rv-dots{display:flex;justify-content:center;gap:6px;padding:12px 0}
.rv-dot{width:6px;height:6px;border-radius:50%;background:#ddd}
.rv-dot.on{background:#2AC1BC;width:16px;border-radius:3px}
/* 우리동네 리뷰 */
.area-chips{display:flex;gap:6px;padding:16px 16px 0;overflow-x:auto;-webkit-overflow-scrolling:touch}.area-chips::-webkit-scrollbar{display:none}
.area-chip{padding:6px 14px;border-radius:16px;font-size:12px;border:1px solid #ddd;background:#fff;cursor:pointer;white-space:nowrap;color:#888;font-weight:500}
.area-chip.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.review-card{margin:12px 16px;padding:16px;background:#fff;border:1px solid #f0f0f0;border-radius:14px}
.review-card .rc-top{display:flex;justify-content:space-between;margin-bottom:4px}.review-card .rc-nm{font-size:15px;font-weight:700}.review-card .rc-area{font-size:12px;color:#888}
.review-card .rc-meta{font-size:12px;color:#888}
/* 직접추천 */
.submit-form{padding:20px 16px}
.submit-form label{font-size:14px;font-weight:700;display:block;margin-bottom:8px}
.submit-form input,.submit-form textarea{width:100%;padding:12px 14px;border:1px solid #ddd;border-radius:12px;font-size:14px;font-family:inherit;margin-bottom:16px}
.submit-form textarea{height:100px;resize:none}
.submit-btn{width:100%;padding:16px;background:#2AC1BC;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:10px}
.share-btn2{width:100%;padding:14px;background:#fff;border:1px solid #ddd;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;text-align:center}
/* 제출 폼 개선 */
.menu-select{display:flex;gap:8px;margin-bottom:16px}
.menu-slot{flex:1;padding:14px;background:#f9f9f9;border:1.5px dashed #ddd;border-radius:12px;text-align:center;cursor:pointer;font-size:13px;color:#888;transition:all .2s}
.menu-slot.filled{border-style:solid;border-color:#2AC1BC;background:#F0FAFA;color:#1a1a1a;font-weight:600}
.menu-plus{font-size:18px;color:#ccc;display:flex;align-items:center;padding:0 4px}
.tag-select{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.tag-opt{padding:6px 12px;border:1px solid #ddd;border-radius:16px;font-size:12px;color:#888;cursor:pointer}
.tag-opt.on{background:#2AC1BC;color:#fff;border-color:#2AC1BC}
.auto-name{padding:12px 14px;background:#F0FAFA;border-radius:12px;font-size:14px;font-weight:600;color:#2AC1BC;margin-bottom:16px;display:flex;align-items:center;gap:6px}
/* 제출 완료 */
.submit-done{display:none;padding:24px 16px;text-align:center}
.submit-done.show{display:block}
.done-card{background:linear-gradient(135deg,#2AC1BC,#1DA8A3);border-radius:16px;padding:24px;color:#fff;margin-bottom:16px}
.done-card .d-emoji{font-size:48px;margin-bottom:8px}
.done-card .d-title{font-size:18px;font-weight:800;margin-bottom:4px}
.done-card .d-combo{font-size:14px;opacity:.9;margin-bottom:2px}
.done-card .d-by{font-size:12px;opacity:.7}
.done-actions{display:flex;flex-direction:column;gap:8px}
.done-share{width:100%;padding:14px;background:#FEE500;color:#1a1a1a;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer}
.done-share-sub{font-size:11px;color:#888;margin-top:4px}
.done-order{width:100%;padding:14px;background:#2AC1BC;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer}
.done-browse{width:100%;padding:12px;background:#fff;border:1px solid #ddd;border-radius:12px;font-size:13px;color:#555;cursor:pointer}
/* 섹션3 제철 */

/* 메모장 */

.memo-panel{position:fixed;top:0;right:-380px;width:360px;height:100vh;background:#fff;box-shadow:-4px 0 20px rgba(0,0,0,.1);z-index:99;transition:right .3s;display:flex;flex-direction:column}
.memo-panel.open{right:0}

.memo-item .m-time{font-size:10px;color:#aaa;white-space:nowrap;flex-shrink:0;margin-top:2px}
.memo-item .m-text{flex:1;word-break:break-word}
.memo-item .m-del{background:none;border:none;font-size:12px;color:#ccc;cursor:pointer;flex-shrink:0;padding:0}
.memo-item .m-del:hover{color:#E53935}
.memo-actions{padding:8px 0 0;border-top:1px solid #eee;display:flex;gap:8px;margin-top:8px}
.memo-actions button{flex:1;padding:10px;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer}
.memo-copy{background:#f0f0f0;border:none;color:#555}
.memo-clear{background:none;border:1px solid #ddd;color:#888}
/* 핀 메모 */
.pin-mode .frame{cursor:crosshair}
.pin-btn{position:fixed;top:12px;right:58px;z-index:100;width:40px;height:40px;background:#FF6B00;color:#fff;border:none;border-radius:50%;font-size:18px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.pin-btn.active{background:#E53935;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(229,57,53,.4)}50%{box-shadow:0 0 0 8px rgba(229,57,53,0)}}
.pin{position:absolute;z-index:30;cursor:pointer;transition:transform .1s}
.pin:hover{transform:scale(1.2)}
.pin-dot{width:24px;height:24px;background:#FF6B00;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;box-shadow:0 2px 6px rgba(0,0,0,.2);border:2px solid #fff}
.pin-tooltip{position:absolute;top:28px;left:-4px;background:#1a1a1a;color:#fff;padding:8px 10px;border-radius:8px;font-size:12px;line-height:1.4;white-space:nowrap;max-width:200px;white-space:normal;display:none;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.pin-tooltip::before{content:'';position:absolute;top:-5px;left:8px;width:10px;height:10px;background:#1a1a1a;transform:rotate(45deg)}
.pin:hover .pin-tooltip{display:block}
.pin-input-wrap{position:absolute;z-index:31;background:#fff;border-radius:12px;padding:12px;box-shadow:0 4px 20px rgba(0,0,0,.15);width:220px;display:none}
.pin-input-wrap.show{display:block}
.pin-input-wrap input{width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit;margin-bottom:8px}
.pin-input-wrap .pin-actions{display:flex;gap:6px}
.pin-input-wrap button{flex:1;padding:6px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer}
.pin-save{background:#FF6B00;color:#fff;border:none}
.pin-cancel{background:#fff;border:1px solid #ddd;color:#888}
</style>
</head>
<div class="frame"><div style="padding-top:16px">
<div class="promo"><div class="promo-t">🎁 상시 혜택</div><div class="promo-sub">지금 바로 사용 가능한 할인 혜택</div>
<div class="promo-sec">
<div class="promo-sec-t">인기 브랜드 할인</div>
<div class="deal-card"><div class="deal-img">🍕</div><div class="deal-bd"><div class="deal-nm">도미노피자 포테이토</div><div class="deal-price">11,000원 할인 <span class="deal-orig">22,900원</span></div></div><button class="deal-btn">쿠폰받기</button></div>
<div class="deal-card"><div class="deal-img">🍗</div><div class="deal-bd"><div class="deal-nm">교촌치킨 허니콤보</div><div class="deal-price">10,000원 할인 <span class="deal-orig">19,000원</span></div></div><button class="deal-btn">쿠폰받기</button></div></div>
<div class="promo-sec">
<div class="promo-sec-t">우리 동네 할인 가게</div>
<div class="promo-sec-sub">2천원 이상 <b>10% 이상 할인</b> 중</div>
<div class="near-card"><div class="near-img">🍛</div><div class="near-bd"><div class="near-nm">치킨앤맥주 서초점</div><div class="near-ds">⭐ 4.8 · 배달비 무료 · 1,000원~2,400원</div></div></div>
<div class="near-card"><div class="near-img">🥘</div><div class="near-bd"><div class="near-nm">치킨앤맥주 역삼점</div><div class="near-ds">⭐ 4.6 · 배달비 무료 · 1,000원~2,400원</div></div></div>
<button class="more-btn">할인 중인 가게 더 보기 ›</button></div>
<div class="promo-sec">
<div class="promo-sec-t">💳 카카오페이 결제 혜택</div>
<div style="width:100%;height:120px;background:#e8e8e8;border-radius:14px;display:flex;align-items:center;justify-content:center;color:#999;font-size:13px">카카오페이 혜택 이미지 영역</div></div>
<div class="share-sec"><p>오늘 메뉴 고민 중인 친구에게<br>공유해보세요</p>
<div class="share-icons"><div class="share-icon"><span>💬</span>카카오톡</div><div class="share-icon"><span>🔗</span>링크복사</div></div></div>
</div>
</div>
</div></div>
<script>
var memos=JSON.parse(localStorage.getItem('mukbok-memos')||'[]');
var pins=JSON.parse(localStorage.getItem('mukbok-pins')||'[]');
var memoTab='all';
function switchMemoTab(t){
  memoTab=t;
  ['all','memo','pin'].forEach(function(k){
    var b=document.getElementById('mt-'+k);
    b.style.background=k===t?'#2AC1BC':'#f0f0f0';
    b.style.color=k===t?'#fff':'#555';
  });
  renderMemos();
}
function renderMemos(){
  var el=document.getElementById('memo-list');
  var items=[];
  if(memoTab==='all'||memoTab==='memo'){
    memos.forEach(function(m,i){
      items.push({type:'memo',time:m.time,text:m.text,idx:i,sort:m.ts||0});
    });
  }
  if(memoTab==='all'||memoTab==='pin'){
    pins.forEach(function(p,i){
      items.push({type:'pin',time:p.time,text:p.text,idx:i,num:i+1,sort:p.ts||0});
    });
  }
  items.sort(function(a,b){return b.sort-a.sort});
  el.innerHTML=items.map(function(it){
    var tag=it.type==='pin'?'<span style="background:#FF6B00;color:#fff;font-size:9px;padding:1px 5px;border-radius:4px;margin-right:4px">📌 #'+it.num+'</span>':'<span style="background:#2AC1BC;color:#fff;font-size:9px;padding:1px 5px;border-radius:4px;margin-right:4px">💬</span>';
    var del=it.type==='memo'?'<button class="m-del" onclick="delMemo('+it.idx+')">✕</button>':'<button class="m-del" onclick="delPin('+it.idx+')">✕</button>';
    return '<div class="memo-item"><span class="m-time">'+it.time+'</span><span class="m-text">'+tag+it.text+'</span>'+del+'</div>';
  }).join('');
  localStorage.setItem('mukbok-memos',JSON.stringify(memos));
}
function addMemo(){
  var inp=document.getElementById('memo-in');
  if(!inp.value.trim())return;
  var now=new Date();
  memos.push({text:inp.value.trim(),time:now.getHours()+':'+String(now.getMinutes()).padStart(2,'0'),ts:Date.now()});
  inp.value='';renderMemos();
}
function delMemo(i){memos.splice(i,1);renderMemos();}
function delPin(i){pins.splice(i,1);savePins();renderPins();renderMemos();}
function clearAll(){
  if(!confirm('메모와 핀을 모두 삭제할까요?'))return;
  memos=[];pins=[];savePins();renderPins();renderMemos();
}
function copyAll(){
  var lines=[];
  memos.forEach(function(m){lines.push('[💬 '+m.time+'] '+m.text);});
  pins.forEach(function(p,i){lines.push('[📌 #'+(i+1)+' '+p.time+'] '+p.text);});
  navigator.clipboard.writeText(lines.join('\n')).then(function(){alert('전체 메모가 클립보드에 복사되었습니다!')});
}
renderMemos();

// 핀 메모
var pinMode=false;
var frame=document.querySelector('.frame');
function togglePinMode(){
  pinMode=!pinMode;
  document.getElementById('pin-btn').classList.toggle('active',pinMode);
  document.body.classList.toggle('pin-mode',pinMode);
}
function renderPins(){
  frame.querySelectorAll('.pin,.pin-input-wrap').forEach(function(p){p.remove()});
  pins.forEach(function(p,i){
    var el=document.createElement('div');el.className='pin';
    el.style.left=p.x+'px';el.style.top=p.y+'px';
    el.innerHTML='<div class="pin-dot">'+(i+1)+'</div><div class="pin-tooltip"><b>#'+(i+1)+'</b> '+p.text+'<br><span style="font-size:10px;color:#aaa">'+p.time+' · 더블클릭으로 삭제</span></div>';
    el.ondblclick=function(e){e.stopPropagation();pins.splice(i,1);savePins();renderPins();renderMemos();};
    el.onclick=function(e){if(pinMode)e.stopPropagation();};
    frame.appendChild(el);
  });
}
function savePins(){localStorage.setItem('mukbok-pins',JSON.stringify(pins));}
document.addEventListener('click',function(e){
  if(!pinMode)return;
  if(e.target.closest('.pin-input-wrap,.pin-btn,.memo-panel,.memo-toggle,.pin'))return;
  e.preventDefault();e.stopPropagation();
  var rect=frame.getBoundingClientRect();
  var scrollY=window.pageYOffset||document.documentElement.scrollTop;
  var x=e.clientX-rect.left;
  var frameTop=rect.top+scrollY;
  var y=e.pageY-frameTop;
  if(x<0||x>rect.width)return;
  frame.querySelectorAll('.pin-input-wrap').forEach(function(p){p.remove()});
  var w=document.createElement('div');w.className='pin-input-wrap show';
  w.style.left=Math.min(x+10,rect.width-230)+'px';w.style.top=y+'px';
  w.innerHTML='<input placeholder="이 영역에 대한 의견...">'+'<div class="pin-actions"><button class="pin-save" onclick="saveNewPin(this)">저장</button><button class="pin-cancel" onclick="this.closest(\'.pin-input-wrap\').remove()">취소</button></div>';
  w.onclick=function(ev){ev.stopPropagation();};
  w.dataset.x=x;w.dataset.y=y;
  frame.appendChild(w);
  setTimeout(function(){w.querySelector('input').focus();},100);
  w.querySelector('input').onkeydown=function(ev){if(ev.key==='Enter')saveNewPin(w.querySelector('.pin-save'));};
},true);
function saveNewPin(btn){
  var w=btn.closest('.pin-input-wrap');var text=w.querySelector('input').value.trim();
  if(!text){w.remove();return;}
  var now=new Date();
  pins.push({x:+w.dataset.x,y:+w.dataset.y,text:text,time:now.getHours()+':'+String(now.getMinutes()).padStart(2,'0'),ts:Date.now()});
  savePins();renderPins();renderMemos();w.remove();togglePinMode();
}
renderPins();
</script>
